<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #34495e;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }


        h1 {
            color: var(--dark);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #resultado {
            font-size: 5rem;
            font-weight: bold;
            color: var(--dark);
            margin: 20px 0;
            display: block; 
            min-height: 1.2em; 
        }

        .controles {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        #btnContadorDisminuye {
            background-color: white;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        #btnContadorDisminuye:hover {
            background-color: var(--danger);
            color: white;
        }

        #btnContadorResetea {
            background-color: #e0e0e0;
            color: var(--dark);
        }
        #btnContadorResetea:hover {
            background-color: #d6d6d6;
        }

        #btnContadorAumenta {
            background-color: var(--primary);
            color: white;
        }
        #btnContadorAumenta:hover {
            background-color: #357abd;
            box-shadow: 0 6px 12px rgba(74, 144, 226, 0.3);
        }
    </style>
</head>
<body>

    <main class="card">
        <h1>Contador de Clics</h1>
        
        <div id="resultado">0</div>

        <div class="controles">
            <button id="btnContadorDisminuye"> − </button>
            <button id="btnContadorResetea">Resetear</button>
            <button id="btnContadorAumenta"> + </button>
        </div>
    </main>

    <script src="contador.js"></script>
</body>
</html>
