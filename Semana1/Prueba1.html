<!DOCTYPE html>
<html>
    <head>
        <title>JS Integrado</title>
    </head>
    <body>
        <h1 id="titulo">Hola Mundo</h1>
        <button onclick="cambiarTexto()">Cambiar Texto</button>
    <script>
        function cambiarTexto(){
            document.getElementById('titulo').innerHTML = '¡Texto Cambiado!';
        }
    </script>
    </body>
</html>
